  <style>
    /* Blog layout styles */
    .blog-page {
      padding-top: 6rem;
      padding-bottom: 4rem;
    }

    .blog-hero {
      text-align: center;
      margin-bottom: 3rem;
    }

    .blog-hero h1 {
      font-size: 2.5rem;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 0.5rem;
    }

    .blog-hero p {
      color: var(--text-secondary);
      font-size: 1.1rem;
    }

    .blog-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1.5rem;
      max-width: 960px;
      margin: 0 auto;
    }

    .blog-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 1.75rem;
      transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
    }

    .blog-card:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow-soft);
      border-color: var(--border-strong);
    }

    .blog-card-link {
      display: block;
      text-decoration: none;
      color: inherit;
    }

    .blog-card-title {
      font-size: 1.25rem;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 0.75rem;
      line-height: 1.4;
    }

    .blog-card-meta {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      color: var(--text-muted);
      font-size: 0.875rem;
      margin-bottom: 0.75rem;
    }

    .blog-card-filename {
      color: var(--text-muted);
      font-size: 0.8rem;
      font-family: 'IBM Plex Mono', monospace;
      margin: 0;
    }

    .blog-empty {
      text-align: center;
      color: var(--text-muted);
      padding: 3rem;
      grid-column: 1 / -1;
    }

    /* Article detail styles */
    .blog-back-link {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
      margin-bottom: 2rem;
      transition: color 0.18s ease;
    }

    .blog-back-link:hover {
      color: var(--accent-hover);
    }

    .blog-article-header {
      margin-bottom: 2.5rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--border-color);
    }

    .blog-article-title {
      font-size: 2rem;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 0.75rem;
      line-height: 1.3;
    }

    .blog-article-meta {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    .blog-article-body {
      max-width: 760px;
      margin: 0 auto;
      color: var(--text-secondary);
      line-height: 1.75;
    }

    .blog-article-body h1,
    .blog-article-body h2,
    .blog-article-body h3,
    .blog-article-body h4 {
      color: var(--text-primary);
      margin-top: 2.5rem;
      margin-bottom: 1rem;
      font-weight: 600;
    }

    .blog-article-body h1 { font-size: 1.75rem; }
    .blog-article-body h2 { font-size: 1.5rem; }
    .blog-article-body h3 { font-size: 1.25rem; }
    .blog-article-body h4 { font-size: 1.1rem; }

    .blog-article-body p {
      margin-bottom: 1.25rem;
    }

    .blog-article-body a {
      color: var(--accent);
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    .blog-article-body a:hover {
      color: var(--accent-hover);
    }

    .blog-article-body ul,
    .blog-article-body ol {
      margin-bottom: 1.25rem;
      padding-left: 1.5rem;
    }

    .blog-article-body li {
      margin-bottom: 0.4rem;
    }

    .blog-article-body blockquote {
      border-left: 3px solid var(--accent);
      padding-left: 1.25rem;
      margin: 1.5rem 0;
      color: var(--text-muted);
      font-style: italic;
    }

    .blog-article-body code {
      background: var(--bg-tertiary);
      color: var(--text-primary);
      padding: 0.15rem 0.4rem;
      border-radius: 4px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.875em;
    }

    .blog-article-body pre {
      background: var(--bg-dark);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 1.25rem;
      overflow-x: auto;
      margin: 1.5rem 0;
    }

    .blog-article-body pre code {
      background: transparent;
      padding: 0;
      font-size: 0.85rem;
      line-height: 1.6;
    }

    .blog-article-body hr {
      border: none;
      border-top: 1px solid var(--border-color);
      margin: 2.5rem 0;
    }

    .blog-article-body img {
      max-width: 100%;
      border-radius: 8px;
      margin: 1.5rem 0;
    }

    .blog-article-body table {
      width: 100%;
      border-collapse: collapse;
      margin: 1.5rem 0;
    }

    .blog-article-body th,
    .blog-article-body td {
      border: 1px solid var(--border-color);
      padding: 0.75rem;
      text-align: left;
    }

    .blog-article-body th {
      background: var(--bg-tertiary);
      color: var(--text-primary);
      font-weight: 600;
    }

    .blog-loading,
    .blog-error {
      text-align: center;
      padding: 3rem;
      color: var(--text-muted);
    }

    .blog-error {
      color: #d9534f;
    }
  </style>
</head>
