  <style>
    /* Blog layout styles */
    .blog-page {
      padding-top: 6rem;
      padding-bottom: 4rem;
    }

    .blog-hero {
      text-align: center;
      margin-bottom: 3rem;
    }

    .blog-hero h1 {
      font-size: 2rem;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 0.5rem;
    }

    .blog-hero p {
      color: var(--text-secondary);
      font-size: 0.95rem;
    }

    /* Featured Article Card (used for paginated list) */
    .blog-featured-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 2rem;
      margin-bottom: 1.5rem;
      transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
    }

    .blog-featured-card:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-soft);
      border-color: var(--border-strong);
    }

    .blog-featured-label {
      color: var(--text-muted);
      font-size: 0.875rem;
      font-weight: 500;
      margin-bottom: 0.5rem;
      display: block;
    }

    .blog-featured-title {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 0.75rem;
      line-height: 1.3;
    }

    .blog-featured-title a {
      color: inherit;
      text-decoration: none;
    }

    .blog-featured-title a:hover {
      color: var(--accent);
    }

    .blog-featured-description {
      color: var(--text-secondary);
      font-size: 0.95rem;
      line-height: 1.7;
      margin-bottom: 1rem;
    }

    .blog-featured-meta {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex-wrap: wrap;
      margin-bottom: 1.25rem;
    }

    .blog-featured-date {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      color: var(--text-muted);
      font-size: 0.85rem;
    }

    .blog-featured-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .blog-tag {
      display: inline-block;
      padding: 0.2rem 0.6rem;
      border-radius: 4px;
      font-size: 0.75rem;
      font-weight: 500;
      border: 1px solid;
      font-family: 'IBM Plex Mono', monospace;
    }

    .blog-read-btn {
      display: inline-block;
      padding: 0.5rem 1rem;
      background: var(--bg-tertiary);
      border: 1px solid var(--border-color);
      border-radius: 6px;
      color: var(--text-primary);
      font-size: 0.9rem;
      font-weight: 500;
      text-decoration: none;
      transition: background 0.18s ease, border-color 0.18s ease, color 0.18s ease;
    }

    .blog-read-btn:hover {
      background: var(--accent);
      border-color: var(--accent);
      color: var(--bg-primary);
    }

    /* Pagination */
    .blog-pagination {
      display: flex;
      justify-content: center;
      gap: 0.5rem;
      margin-top: 2rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border-color);
    }

    .blog-page-btn {
      padding: 0.4rem 0.85rem;
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: 6px;
      color: var(--text-secondary);
      font-size: 0.875rem;
      cursor: pointer;
      transition: background 0.18s ease, border-color 0.18s ease, color 0.18s ease;
    }

    .blog-page-btn:hover {
      background: var(--bg-tertiary);
      border-color: var(--border-strong);
    }

    .blog-page-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: var(--bg-primary);
      font-weight: 600;
    }

    .blog-page-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    /* Sidebar */
    .blog-sidebar-section {
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }

    .blog-sidebar-title {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 1.25rem;
    }

    .blog-sidebar-item {
      padding-bottom: 1.25rem;
      margin-bottom: 1.25rem;
      border-bottom: 1px solid var(--border-color);
    }

    .blog-sidebar-item:last-child {
      padding-bottom: 0;
      margin-bottom: 0;
      border-bottom: none;
    }

    .blog-sidebar-item-title {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 0.35rem;
      line-height: 1.4;
    }

    .blog-sidebar-item-title a {
      color: inherit;
      text-decoration: none;
    }

    .blog-sidebar-item-title a:hover {
      color: var(--accent);
    }

    .blog-sidebar-item-meta {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      color: var(--text-muted);
      font-size: 0.8rem;
      margin-bottom: 0.5rem;
    }

    .blog-sidebar-item-desc {
      color: var(--text-secondary);
      font-size: 0.85rem;
      line-height: 1.5;
      margin-bottom: 0.5rem;
    }

    .blog-sidebar-item-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
    }

    /* Newsletter */
    .blog-newsletter-title {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 0.5rem;
    }

    .blog-newsletter-desc {
      color: var(--text-secondary);
      font-size: 0.875rem;
      line-height: 1.6;
      margin-bottom: 1rem;
    }

    .blog-newsletter-form {
      display: flex;
      gap: 0.5rem;
    }

    .blog-newsletter-input {
      flex: 1;
      padding: 0.5rem 0.75rem;
      background: var(--bg-dark);
      border: 1px solid var(--border-color);
      border-radius: 6px;
      color: var(--text-primary);
      font-size: 0.9rem;
    }

    .blog-newsletter-input::placeholder {
      color: var(--text-muted);
    }

    .blog-newsletter-input:focus {
      outline: none;
      border-color: var(--accent);
    }

    .blog-newsletter-btn {
      padding: 0.5rem 1rem;
      background: var(--text-primary);
      border: none;
      border-radius: 6px;
      color: var(--bg-primary);
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.18s ease;
    }

    .blog-newsletter-btn:hover {
      opacity: 0.85;
    }

    .blog-empty {
      text-align: center;
      color: var(--text-muted);
      padding: 3rem;
      grid-column: 1 / -1;
    }

    /* Article detail styles */
    .blog-back-link {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
      margin-bottom: 2rem;
      transition: color 0.18s ease;
    }

    .blog-back-link:hover {
      color: var(--accent-hover);
    }

    .blog-article-header {
      margin-bottom: 2.5rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--border-color);
    }

    .blog-article-title {
      font-size: 2rem;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 0.75rem;
      line-height: 1.3;
    }

    .blog-article-meta {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    .blog-article-body {
      max-width: 760px;
      margin: 0 auto;
      color: var(--text-secondary);
      line-height: 1.75;
    }

    .blog-article-body h1,
    .blog-article-body h2,
    .blog-article-body h3,
    .blog-article-body h4 {
      color: var(--text-primary);
      margin-top: 2.5rem;
      margin-bottom: 1rem;
      font-weight: 600;
    }

    .blog-article-body h1 { font-size: 1.75rem; }
    .blog-article-body h2 { font-size: 1.5rem; }
    .blog-article-body h3 { font-size: 1.25rem; }
    .blog-article-body h4 { font-size: 1.1rem; }

    .blog-article-body p {
      margin-bottom: 1.25rem;
    }

    .blog-article-body a {
      color: var(--accent);
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    .blog-article-body a:hover {
      color: var(--accent-hover);
    }

    .blog-article-body ul,
    .blog-article-body ol {
      margin-bottom: 1.25rem;
      padding-left: 1.5rem;
    }

    .blog-article-body li {
      margin-bottom: 0.4rem;
    }

    .blog-article-body blockquote {
      border-left: 3px solid var(--accent);
      padding-left: 1.25rem;
      margin: 1.5rem 0;
      color: var(--text-muted);
      font-style: italic;
    }

    .blog-article-body code {
      background: var(--bg-tertiary);
      color: var(--text-primary);
      padding: 0.15rem 0.4rem;
      border-radius: 4px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.875em;
    }

    .blog-article-body pre {
      background: var(--bg-dark);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 1.25rem;
      overflow-x: auto;
      margin: 1.5rem 0;
    }

    .blog-article-body pre code {
      background: transparent;
      padding: 0;
      font-size: 0.85rem;
      line-height: 1.6;
    }

    .blog-article-body hr {
      border: none;
      border-top: 1px solid var(--border-color);
      margin: 2.5rem 0;
    }

    .blog-article-body img {
      max-width: 100%;
      border-radius: 8px;
      margin: 1.5rem 0;
    }

    .blog-article-body table {
      width: 100%;
      border-collapse: collapse;
      margin: 1.5rem 0;
    }

    .blog-article-body th,
    .blog-article-body td {
      border: 1px solid var(--border-color);
      padding: 0.75rem;
      text-align: left;
    }

    .blog-article-body th {
      background: var(--bg-tertiary);
      color: var(--text-primary);
      font-weight: 600;
    }

    .blog-loading,
    .blog-error {
      text-align: center;
      padding: 3rem;
      color: var(--text-muted);
    }

    .blog-error {
      color: #d9534f;
    }
  </style>
</head>

          <div id="blog-sidebar"></div>
        </div>
      </div>

  </main>
